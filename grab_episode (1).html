<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>111movies Search Player</title>
<style>
body { font-family: Arial; background:#111; color:#eee; display:flex; gap:20px; padding:20px; }
body.dark { background:#f5f5f5; color:#222; }

aside { width:260px; background:#1e1e1e; padding:15px; border-radius:10px; }
body.dark aside { background:#ddd; }

ul { list-style:none; padding:0; }
li { padding:8px; margin-bottom:6px; background:#333; border-radius:6px; cursor:pointer; }
body.dark li { background:#bbb; }

button { padding:6px 12px; margin-top:8px; border-radius:6px; cursor:pointer; }

iframe { width:100%; height:600px; border:none; margin-top:20px; background:black; }

#results { max-height:200px; overflow:auto; margin-top:8px; }
.result { padding:6px; border-radius:4px; cursor:pointer; }
.result:hover { background:rgba(255,255,255,0.15); }

#tvSelector { display:none; margin-top:20px; padding:15px; background:#222; border-radius:8px; }
body.dark #tvSelector { background:#ccc; }
</style>
</head>

<body>

<aside>
<h3>Movies 🎬</h3>
<ul id="movieFavs"></ul>

<h3>TV Shows 📺</h3>
<ul id="tvFavs"></ul>

<button id="clearFavs">Clear All</button>
</aside>

<div style="flex:1">

<button onclick="document.body.classList.toggle('dark')">Toggle Dark Mode</button>

<h2>Search</h2>

<select id="typeSelect">
<option value="movie">Movie</option>
<option value="tv">TV Show</option>
</select>

<input id="searchInput" placeholder="Search title">
<button id="searchBtn">Search</button>

<div id="results"></div>

<button id="loadBtn">Load</button>
<button id="favBtn">Add to Favorites</button>

<div id="tvSelector">
<h3 id="tvTitle"></h3>
<select id="seasonSelect"></select>
<select id="episodeSelect"></select>
<button id="playEpisode">Play Episode</button>
</div>

<iframe id="player"></iframe>

</div>

<script>
const TMDB_API_KEY = "a88916c7c4cb176a0f0caed0b298587a";
const BASE = "https://api.themoviedb.org/3";
const FAV_KEY = "tmdbPlayerFavs";

const searchBtn = document.getElementById("searchBtn");
const searchInput = document.getElementById("searchInput");
const results = document.getElementById("results");
const typeSelect = document.getElementById("typeSelect");
const player = document.getElementById("player");
const favBtn = document.getElementById("favBtn");
const loadBtn = document.getElementById("loadBtn");

const tvSelector = document.getElementById("tvSelector");
const tvTitle = document.getElementById("tvTitle");
const seasonSelect = document.getElementById("seasonSelect");
const episodeSelect = document.getElementById("episodeSelect");
const playEpisode = document.getElementById("playEpisode");

let current = null;
let currentIMDb = null;

async function tmdb(endpoint){
    const res = await fetch(`${BASE}${endpoint}?api_key=${TMDB_API_KEY}`);
    return res.json();
}

searchBtn.onclick = async () => {
    results.innerHTML="";
    const query = searchInput.value.trim();
    if(!query) return;

    const data = await tmdb(`/search/${typeSelect.value}?query=${encodeURIComponent(query)}`);
    data.results.forEach(item=>{
        const div=document.createElement("div");
        div.className="result";
        div.textContent=item.title||item.name;
        div.onclick=()=>selectItem(item);
        results.appendChild(div);
    });
};

async function selectItem(item){
    current=item;
    results.innerHTML="";
    tvSelector.style.display="none";

    const external = await tmdb(`/${typeSelect.value}/${item.id}/external_ids`);
    currentIMDb = external.imdb_id;
}

loadBtn.onclick = ()=>{
    if(!currentIMDb) return alert("Search and select first");
    if(typeSelect.value==="movie"){
        player.src=`https://111movies.com/movie/${currentIMDb}`;
    } else {
        tvSelector.style.display="block";
        loadTVSeasons();
    }
};

async function loadTVSeasons(){
    tvTitle.textContent=current.name;
    const data=await tmdb(`/tv/${current.id}`);
    seasonSelect.innerHTML="";
    data.seasons.filter(s=>s.season_number>0).forEach(s=>{
        const opt=document.createElement("option");
        opt.value=s.season_number;
        opt.textContent="Season "+s.season_number;
        seasonSelect.appendChild(opt);
    });
    loadEpisodes();
}

seasonSelect.onchange=loadEpisodes;

async function loadEpisodes(){
    const season=seasonSelect.value;
    const data=await tmdb(`/tv/${current.id}/season/${season}`);
    episodeSelect.innerHTML="";
    data.episodes.forEach(e=>{
        const opt=document.createElement("option");
        opt.value=e.episode_number;
        opt.textContent=`E${e.episode_number} - ${e.name}`;
        episodeSelect.appendChild(opt);
    });
}

playEpisode.onclick=()=>{
    player.src=`https://111movies.com/tv/${currentIMDb}/${seasonSelect.value}/${episodeSelect.value}`;
};

favBtn.onclick=()=>{
    if(!currentIMDb) return;
    const favs=JSON.parse(localStorage.getItem(FAV_KEY))||[];
    if(favs.some(f=>f.imdb===currentIMDb)) return alert("Already added");

    favs.push({
        type:typeSelect.value,
        imdb:currentIMDb,
        title:current.title||current.name,
        tmdbId:current.id
    });
    localStorage.setItem(FAV_KEY,JSON.stringify(favs));
    loadFavs();
};

function loadFavs(){
    const favs=JSON.parse(localStorage.getItem(FAV_KEY))||[];
    movieFavs.innerHTML="";
    tvFavs.innerHTML="";
    favs.forEach(f=>{
        const li=document.createElement("li");
        li.textContent=f.title;
        li.onclick=()=>playFav(f);
        if(f.type==="movie") movieFavs.appendChild(li);
        else tvFavs.appendChild(li);
    });
}

function playFav(f){
    if(f.type==="movie"){
        player.src=`https://111movies.com/movie/${f.imdb}`;
    } else {
        currentIMDb=f.imdb;
        current={id:f.tmdbId,name:f.title};
        typeSelect.value="tv";
        loadTVSeasons();
    }
}

clearFavs.onclick=()=>{
    if(confirm("Clear all?")){
        localStorage.removeItem(FAV_KEY);
        loadFavs();
    }
};

loadFavs();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>111movies Player</title>
<style>
body {
    font-family: Arial, sans-serif;
    background:#111;
    color:#eee;
    display:flex;
    gap:20px;
    padding:20px;
}
body.dark { background:#f5f5f5; color:#222; }

aside {
    width:240px;
    background:#1e1e1e;
    padding:15px;
    border-radius:10px;
}
body.dark aside { background:#ddd; }

h3 { margin-top:20px; }

ul { list-style:none; padding:0; }

li {
    padding:8px;
    margin-bottom:6px;
    background:#333;
    border-radius:6px;
    cursor:pointer;
}
body.dark li { background:#bbb; }

button {
    padding:6px 12px;
    margin-top:8px;
    border-radius:6px;
    cursor:pointer;
}

#mainContent { flex:1; }

iframe {
    width:100%;
    height:600px;
    border:none;
    margin-top:20px;
    background:black;
}

#tvSelectorUI {
    display:none;
    margin-top:20px;
    padding:15px;
    background:#222;
    border-radius:8px;
}
body.dark #tvSelectorUI { background:#ccc; }
</style>
</head>

<body>

<aside>
    <h3>Movies 🎬</h3>
    <ul id="movieFavoritesList"></ul>

    <h3>TV Shows 📺</h3>
    <ul id="tvFavoritesList"></ul>

    <button id="clearFavoritesBtn">🗑 Clear All Favorites</button>
</aside>

<section id="mainContent">

<button id="darkModeToggle">Toggle Dark Mode</button>

<h2>111movies Embed Player</h2>

<label>Type:</label>
<select id="typeSelect">
    <option value="movie">Movie</option>
    <option value="tv">TV</option>
</select>

<label>ID (IMDb):</label>
<input type="text" id="idInput" placeholder="tt0903747">

<div id="tvInputs" style="display:none;">
    <label>Season:</label>
    <input type="number" id="seasonInput" value="1" min="1">
    <label>Episode:</label>
    <input type="number" id="episodeInput" value="1" min="1">
</div>

<button id="loadBtn">Load</button>
<button id="addFavoriteBtn">Add to Favorites</button>

<div id="tvSelectorUI">
    <h3 id="selectedShowTitle"></h3>

    <label>Season:</label>
    <select id="seasonDropdown"></select>

    <label>Episode:</label>
    <select id="episodeDropdown"></select>

    <button id="playEpisodeBtn">Play Episode</button>
</div>

<iframe id="contentFrame"></iframe>

</section>

<script>
const FAVORITES_KEY = "moviePlayerFavorites";

const typeSelect = document.getElementById("typeSelect");
const tvInputs = document.getElementById("tvInputs");
const idInput = document.getElementById("idInput");
const seasonInput = document.getElementById("seasonInput");
const episodeInput = document.getElementById("episodeInput");
const loadBtn = document.getElementById("loadBtn");
const addFavoriteBtn = document.getElementById("addFavoriteBtn");
const contentFrame = document.getElementById("contentFrame");

const movieFavoritesList = document.getElementById("movieFavoritesList");
const tvFavoritesList = document.getElementById("tvFavoritesList");
const clearFavoritesBtn = document.getElementById("clearFavoritesBtn");

const tvSelectorUI = document.getElementById("tvSelectorUI");
const selectedShowTitle = document.getElementById("selectedShowTitle");
const seasonDropdown = document.getElementById("seasonDropdown");
const episodeDropdown = document.getElementById("episodeDropdown");
const playEpisodeBtn = document.getElementById("playEpisodeBtn");

let currentImdbId = null;
let allEpisodes = [];

// Toggle TV inputs
typeSelect.addEventListener("change", () => {
    tvInputs.style.display = typeSelect.value === "tv" ? "block" : "none";
});

// Build player URL
function buildUrl() {
    const type = typeSelect.value;
    const id = idInput.value.trim();
    if (!id) return null;

    if (type === "movie") {
        return `https://111movies.com/movie/${id}`;
    } else {
        return `https://111movies.com/tv/${id}/${seasonInput.value}/${episodeInput.value}`;
    }
}

// Load content
loadBtn.addEventListener("click", () => {
    const url = buildUrl();
    if (url) contentFrame.src = url;
});

// Add favorite (FIXED: TV now shows real name)
addFavoriteBtn.addEventListener("click", async () => {

    const id = idInput.value.trim();
    if (!id) return;

    const favs = JSON.parse(localStorage.getItem(FAVORITES_KEY)) || [];

    if (favs.some(f => f.id === id && f.type === typeSelect.value)) {
        alert("Already in favorites.");
        return;
    }

    let title = id;

    if (typeSelect.value === "tv") {
        try {
            const res = await fetch(`https://api.tvmaze.com/lookup/shows?imdb=${id}`);
            if (res.ok) {
                const data = await res.json();
                title = data.name;
            }
        } catch (err) {
            console.error("TVMaze lookup failed:", err);
        }
    }

    const newFav = { type: typeSelect.value, id, title };
    favs.push(newFav);
    localStorage.setItem(FAVORITES_KEY, JSON.stringify(favs));
    loadFavorites();
});

// Load favorites
function loadFavorites() {
    const favs = JSON.parse(localStorage.getItem(FAVORITES_KEY)) || [];

    movieFavoritesList.innerHTML = "";
    tvFavoritesList.innerHTML = "";

    favs.forEach(fav => {
        const li = document.createElement("li");
        li.textContent = fav.title;

        if (fav.type === "movie") {
            li.onclick = () => {
                typeSelect.value = "movie";
                idInput.value = fav.id;
                loadBtn.click();
            };
            movieFavoritesList.appendChild(li);
        } else {
            li.onclick = () => showTvSelector(fav);
            tvFavoritesList.appendChild(li);
        }
    });
}

// Clear favorites
clearFavoritesBtn.addEventListener("click", () => {
    if (confirm("Clear all favorites?")) {
        localStorage.removeItem(FAVORITES_KEY);
        loadFavorites();
    }
});

// TVMaze functions
async function getTvMazeIdFromImdb(imdbId) {
    const res = await fetch(`https://api.tvmaze.com/lookup/shows?imdb=${imdbId}`);
    if (!res.ok) return null;
    const data = await res.json();
    return data.id;
}

async function fetchEpisodes(tvMazeId) {
    const res = await fetch(`https://api.tvmaze.com/shows/${tvMazeId}/episodes`);
    if (!res.ok) return [];
    return await res.json();
}

async function showTvSelector(fav) {
    tvSelectorUI.style.display = "block";
    selectedShowTitle.textContent = fav.title;
    currentImdbId = fav.id;

    const tvMazeId = await getTvMazeIdFromImdb(fav.id);
    if (!tvMazeId) return alert("Show not found.");

    allEpisodes = await fetchEpisodes(tvMazeId);

    const seasons = [...new Set(allEpisodes.map(e => e.season))];
    seasonDropdown.innerHTML = "";

    seasons.forEach(s => {
        const opt = document.createElement("option");
        opt.value = s;
        opt.textContent = "Season " + s;
        seasonDropdown.appendChild(opt);
    });

    loadEpisodesForSeason();
}

function loadEpisodesForSeason() {
    const season = parseInt(seasonDropdown.value);
    episodeDropdown.innerHTML = "";

    allEpisodes
        .filter(e => e.season === season)
        .forEach(e => {
            const opt = document.createElement("option");
            opt.value = e.number;
            opt.textContent = `E${e.number} - ${e.name}`;
            episodeDropdown.appendChild(opt);
        });
}

seasonDropdown.addEventListener("change", loadEpisodesForSeason);

playEpisodeBtn.addEventListener("click", () => {
    typeSelect.value = "tv";
    idInput.value = currentImdbId;
    seasonInput.value = seasonDropdown.value;
    episodeInput.value = episodeDropdown.value;
    loadBtn.click();
});

// Dark mode
document.getElementById("darkModeToggle").addEventListener("click", () => {
    document.body.classList.toggle("dark");
});

loadFavorites();
</script>

</body>
</html>
